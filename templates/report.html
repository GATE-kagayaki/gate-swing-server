<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GATE AIスイングドクター｜SWING ANALYSIS REPORT</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@600;700&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
  
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

 <style>
    /* 既存のベーススタイルを維持 */
    body { font-family: 'Noto Sans JP', sans-serif; background:#f3f4f6; }
    .paper { background:#fff; max-width:980px; margin:20px auto; padding:28px; box-shadow: 0 10px 20px rgba(0,0,0,0.06); border-radius: 16px; }
    h2 { border-left:4px solid #111827; padding-left:12px; margin-top:28px; font-weight:700; font-family: 'Noto Serif JP', serif; }
    
    /* 既存のテーブルスタイル（01〜06などで使用される可能性があるため保持） */
    table { width:100%; border-collapse:collapse; margin-top:12px; }
    th,td { border:1px solid #e5e7eb; padding:10px; font-size: 0.95rem; vertical-align: top; }
    th { background:#f9fafb; font-weight: 700; width: 34%; }
    
    .loading { text-align: center; padding: 90px 0; }
    .card { border: 1px solid #e5e7eb; border-radius: 14px; padding: 14px; background: #fff; }
    .muted { color:#6b7280; font-size: 0.88rem; line-height: 1.6; }
    .lead { color:#111827; line-height: 1.8; }
    .badge { display:inline-block; padding:4px 10px; border-radius: 999px; background:#111827; color:#fff; font-size: 12px; }
    .sp { margin-top: 10px; }
    .list li { margin: 6px 0; }

    /* ==================================================
       【修正】08, 09 セクション用：カード型レイアウト
       ================================================== */
    .gate-card-list {
        display: flex;
        flex-direction: column;
        gap: 1.25rem;
        margin-top: 1rem;
    }

    .gate-spec-card {
        background: #ffffff;
        border: 1px solid #e5e7eb;
        border-radius: 1rem;
        padding: 1.25rem;
        box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        border-left: 6px solid #28a745;
    }

    .card-label {
        font-size: 0.75rem;
        font-weight: bold;
        color: #9ca3af;
        text-transform: uppercase;
        margin-bottom: 0.15rem; /* 0.25remから短縮：タイトルと値の距離を詰める */
    }

    .card-value {
        font-size: 1.25rem;
        font-weight: 800;
        color: #111827;
        margin-bottom: 0.5rem; /* 0.75remから短縮：Section 08の余白をタイトに */
        display: block;
    }

    /* 理由・手順などの解説ボックス */
    .card-reason-box {
        font-size: 0.95rem;
        line-height: 1.7;
        color: #4b5563;
        background-color: #f9fafb;
        padding: 1rem;
        border-radius: 0.75rem;
        /* 改行は維持しつつ、リストアイテムのスタイルを許容 */
    }

    /* 【新規追加】Section 09：箇条書きのぶら下げインデント解決 */
    .card-reason-box p {
        margin-bottom: 0.5rem;
        padding-left: 1.2em;   /* 全体を右へ */
        text-indent: -1.2em;  /* 1行目（●）だけ左へ戻す */
        text-align: left;
    }
    .card-reason-box p:last-child {
        margin-bottom: 0;
    }
</style>
</head>

<body>
<div class="paper">

  <div class="text-center">
    <h1 class="text-2xl font-bold">GATE AIスイングドクター</h1>
    <p class="text-sm text-gray-500 mt-1">SWING ANALYSIS REPORT</p>
  </div>

  <div class="mt-6 flex items-center justify-between gap-3">
    <div class="text-xs text-gray-500">
      REPORT ID：<span id="reportId" class="font-mono"></span>
    </div>
    <div id="premiumBadge" class="hidden">
      <span class="badge">PRO REPORT</span>
    </div>
  </div>

  <div id="loading" class="loading">
    <div class="animate-spin h-8 w-8 border-4 border-gray-500 rounded-full border-t-transparent mx-auto"></div>
    <p class="mt-4 text-gray-500 text-sm">レポートデータを読み込み中...</p>
  </div>

  <div id="report-content" class="hidden"></div>

</div>

<script>
  const parts = location.pathname.split("/").filter(Boolean);
  const reportId = parts[parts.length - 1];

  document.getElementById("reportId").innerText = reportId;

  const reportContent = document.getElementById("report-content");
  const loadingEl = document.getElementById("loading");
  const premiumBadge = document.getElementById("premiumBadge");

  function sectionWrap(title) {
    const sec = document.createElement("section");
    sec.className = "mt-7";
    const h2 = document.createElement("h2");
    h2.textContent = title;
    sec.appendChild(h2);
    return sec;
  }
  
  // ==========================================
  // ★【新規追加】総合スコア表示用関数
  // ==========================================
  function render00_score(secData) {
    try {
      // LINE Flex Message用に構築された辞書から、テキストと色を抽出
      const scoreStr = secData.contents[1].contents[0].text;
      const scoreColor = secData.contents[1].contents[0].color;
      const evalText = secData.contents[2].text;

      const sec = document.createElement("section");
      sec.className = "mt-6 mb-2";

      sec.innerHTML = `
        <div style="background-color: #f8f9fa; border-radius: 16px; padding: 24px; text-align: center; border: 2px solid ${scoreColor}; box-shadow: 0 4px 6px rgba(0,0,0,0.05);">
          <div style="font-size: 0.95rem; font-weight: bold; color: #666666; margin-bottom: 8px;">🎯 総合スイングスコア</div>
          <div style="display: flex; justify-content: center; align-items: baseline; gap: 4px;">
            <span style="font-size: 4rem; font-weight: 800; color: ${scoreColor}; line-height: 1;">${scoreStr}</span>
            <span style="font-size: 1.25rem; font-weight: bold; color: #999999;">/ 100点</span>
          </div>
          <div style="font-size: 1rem; color: #555555; margin-top: 12px; font-weight: bold;">${evalText}</div>
        </div>
      `;
      reportContent.appendChild(sec);
    } catch(e) {
      console.error("Score parsing error:", e);
    }
  }

  // ==========================================
  // ★【追加箇所2】比較分析（グラフ・差分）表示用関数
  // ==========================================
  function render00_comparison(secData) {
  try {
    const sec = sectionWrap(secData.title);
    let html = `<p class="text-sm text-gray-600 mb-2">${secData.subtitle}</p>`;

    if (secData.detailed_results) {
      html += `<div class="grid grid-cols-1 gap-1 mb-4">`;
      secData.detailed_results.forEach(res => {
        const textCol = res.is_improved ? 'text-green-600' : 'text-amber-600';
        html += `
          <div class="bg-gray-50 p-2 rounded flex justify-between items-center text-xs border-l-2 ${res.is_improved ? 'border-green-500' : 'border-amber-500'}">
            <span class="font-bold text-gray-700">${res.status} ${res.label}</span>
            <span class="font-mono ${textCol}">${res.diff}</span>
          </div>`;
      });
      html += `</div>`;
    }

    const canvasId = "statusRadarChart";
    html += `<div class="mt-4 bg-white rounded-xl p-4 shadow-inner" style="position: relative; height: 350px; width: 100%; border: 1px solid #f0f0f0;"><canvas id="${canvasId}"></canvas></div>`;

    sec.innerHTML += html;
    reportContent.appendChild(sec);

    setTimeout(() => {
      const canvas = document.getElementById(canvasId);
      if (!canvas || typeof Chart === 'undefined') return;

      const deltas = secData.deltas || {};
      const count = secData.past_sessions_count || 0;
      
      const currentStats = [
        100 + (deltas.shoulder_mean || 0), 100 + (deltas.hip_mean || 0), 100 - (deltas.wrist_mean || 0),
        100 - (deltas.head_mean || 0), 100 - (deltas.knee_mean || 0), 100 + (deltas.x_factor_mean || 0), 100 - (deltas.spine_mean || 0)
      ];

      new Chart(canvas, {
        type: 'radar',
        data: {
          labels: ["肩の回転", "腰の回転", "手首角度", "頭のブレ", "膝の動き", "捻転差", "前傾角"],
          datasets: [
            { label: '今回のスイング', data: currentStats, backgroundColor: 'rgba(34, 197, 94, 0.25)', borderColor: '#22c55e', borderWidth: 3, pointRadius: 4 },
            { label: '過去' + count + '回の平均 (基準)', data: [100, 100, 100, 100, 100, 100, 100], backgroundColor: 'rgba(156, 163, 175, 0.05)', borderColor: '#9ca3af', borderDash: [5, 5], pointRadius: 0 }
          ]
        },
        options: {
          responsive: true, maintainAspectRatio: false,
          scales: { r: { min: 90, max: 110, ticks: { display: false }, grid: { color: '#f0f0f0' }, pointLabels: { font: { size: 12, weight: 'bold' } } } },
          plugins: { legend: { position: 'bottom', labels: { boxWidth: 12, padding: 20 } } }
        }
      });
    }, 500);
  } catch(e) { console.error(e); }
}
  
  // ↓ 見つけていただいた既存のコードがここから続きます ↓
  function renderVideo(videoUrl, downloadUrl) {
    // レポートの「00.」セクションを作成
    const sec = sectionWrap("00. 骨格ライン動画（解析結果）");
    const box = document.createElement("div");
    box.className = "card mt-3";
    
    // 1. まず動画プレイヤーを表示
    box.innerHTML = `
      <div class="muted mb-2">
        前傾ズレなどの検知箇所は色で表示されます（緑→黄→赤）。
      </div>

      <video controls playsinline class="w-full rounded-lg" preload="metadata">
        <source src="${videoUrl}" type="video/mp4">
      </video>

      ${window.reportAddressPosture ? `
      <div class="mt-3 p-3 rounded-lg" style="background:#f7f7f7;">
        <div style="font-weight:700;margin-bottom:4px;">
          ■ アドレス姿勢
        </div>

        <div style="font-weight:600;">
          前傾角：${window.reportAddressPosture.label}
        </div>

        <div style="font-size:14px;line-height:1.6;">
          ${window.reportAddressPosture.comment}
        </div>
      </div>
      ` : ""}

      ${window.reportSpineMaintain ? `
      <div class="mt-3 p-3 rounded-lg" style="background:#f7f7f7;">
        <div style="font-weight:700;margin-bottom:4px;">
          ■ スイング中の前傾維持
        </div>

        <div style="font-weight:600;">
          評価：${window.reportSpineMaintain.label}
        </div>

        <div style="font-size:14px;line-height:1.6;">
          ${window.reportSpineMaintain.comment}
        </div>
      </div>
      ` : ""}

      <div class="muted mt-2">
        ※再生できない場合は、Wi-Fi環境で再読み込みしてください。
      </div>
      `;
    
    // 2. 保存ボタンの作成
    // サーバーの downloadUrl が万が一空でも、videoUrl を使ってボタンを強制表示します
    const finalUrl = downloadUrl || videoUrl;

    if (finalUrl) {
      const saveWrap = document.createElement("div");
      saveWrap.className = "mt-3";

      const saveLink = document.createElement("a");
      saveLink.href = finalUrl;
      saveLink.setAttribute("download", "swing_analysis.mp4");
            
      saveLink.textContent = "📥 動画を保存";
      saveLink.style.cssText = "display:inline-block;padding:10px 16px;background:#00b900;color:#fff;border-radius:8px;text-decoration:none;font-weight:bold;";

      // 保存できない場合のヒント（注釈）
      const saveHint = document.createElement("div");
      saveHint.className = "muted mt-1 text-xs";
      saveHint.style.lineHeight = "1.4";
      saveHint.textContent =
      "※LINE内では動画を保存できない場合があります。動画を保存するには、まずレポートをブラウザで開いてください。その後、保存ボタンを押すか、うまくいかない場合は長押しして保存してください。";
      
      saveWrap.appendChild(saveLink);
      saveWrap.appendChild(saveHint);
      box.appendChild(saveWrap);
    }

    sec.appendChild(box);
    reportContent.appendChild(sec);
  }
 
  function render01(secData) {
    const sec = sectionWrap(secData.title);
    const table = document.createElement("table");
    const tbody = document.createElement("tbody");

    secData.items.forEach(it => {
      const tr = document.createElement("tr");
      const th = document.createElement("th");
      th.textContent = it.name;

      const td = document.createElement("td");
      td.innerHTML = `
        <div class="lead font-bold">${it.value}</div>
        <div class="muted sp">${it.description}</div>
        <div class="muted sp">目安：<span class="font-semibold text-gray-700">${it.guide}</span></div>
      `;

      tr.appendChild(th);
      tr.appendChild(td);
      tbody.appendChild(tr);
    });

    table.appendChild(tbody);
    sec.appendChild(table);
    reportContent.appendChild(sec);
  }

function render02to06(key, secData) {
  const sec = sectionWrap(secData.title);

  // ==========================================
  // ★【新規追加】新しいレイアウト構成（new_eval_dataがある場合）
  // ==========================================
  if (secData.new_eval_data) {
    const evalData = secData.new_eval_data;

    // 1. タイトル直下の結論表示
    const topEval = document.createElement("div");
    topEval.className = "mt-2 font-bold text-lg text-gray-800";
    topEval.textContent = `評価：${evalData.overall_eval}`;
    sec.appendChild(topEval);

    // 2. 数値サマリーの表示
    const summary = document.createElement("div");
    summary.className = "card mt-3 bg-gray-50 border border-gray-200";
    summary.innerHTML = `
      <div class="font-bold text-sm text-gray-500 mb-2 border-b border-gray-200 pb-1">数値サマリー</div>
      <div class="lead font-bold tracking-wide">${evalData.summary_text}</div>
    `;
    sec.appendChild(summary);

    // 3. 評価の内訳（一番下にLLMコメントが含まれている）
    if (secData.pro_comment) {
      const breakdown = document.createElement("div");
      breakdown.className = "card mt-3";
        
      let htmlText = "";
      if (Array.isArray(secData.pro_comment)) {
        htmlText = secData.pro_comment.join("<br>");
      } else {
        // CSSの pre-wrap を使って改行をそのまま表示させます
        htmlText = `<div style="white-space: pre-wrap; line-height: 1.8;">${secData.pro_comment}</div>`;
      }

      breakdown.innerHTML = `
        <div class="font-bold text-sm text-gray-500 mb-2 border-b border-gray-100 pb-1">評価の内訳</div>
        <div class="lead mt-2">${htmlText}</div>
      `;
      sec.appendChild(breakdown);
    }

    reportContent.appendChild(sec);
    return; // 新レイアウトを描画したら、ここで処理を終了して旧レイアウトの処理をスキップ
  }

  // ==========================================
  // 以降は既存のレイアウト（後方互換性のため維持）
  // ==========================================
  const v = document.createElement("div");
  v.className = "muted mt-2";
  v.innerHTML = `解析結果：<span class="font-semibold text-gray-800">${secData.value}</span>`;
  sec.appendChild(v);

  const grid = document.createElement("div");
  grid.className = "grid grid-cols-1 md:grid-cols-2 gap-3 mt-3";

  const good = document.createElement("div");
  good.className = "card";
  good.innerHTML = `<div class="font-bold">良い点</div>
    <ul class="list list-disc pl-5 mt-2">${(secData.good||[]).map(x=>`<li>${x}</li>`).join("")}</ul>`;

  const bad = document.createElement("div");
  bad.className = "card";
  bad.innerHTML = `<div class="font-bold">改善が期待できる点</div>
    <ul class="list list-disc pl-5 mt-2">${(secData.bad||[]).map(x=>`<li>${x}</li>`).join("")}</ul>`;

  grid.appendChild(good);
  grid.appendChild(bad);
  sec.appendChild(grid);

  if (secData.pro_comment) {
    const pc = document.createElement("div");
    pc.className = "card mt-3";

    let proHtml = "";
    if (Array.isArray(secData.pro_comment)) {
      proHtml = secData.pro_comment.map(t => `<p class="lead">${t}</p>`).join("");
    } else {
      proHtml = `<p class="lead">${secData.pro_comment}</p>`;
    }

    pc.innerHTML = `<div class="font-bold">プロ目線</div><div class="mt-2">${proHtml}</div>`;
    sec.appendChild(pc);
  }

  reportContent.appendChild(sec);
}
  
function render08(secData) {
  const sec = sectionWrap(secData.title);

  // ✅ 通常の08（カード型レイアウト）
  const drillList = document.createElement("div");
  drillList.className = "gate-card-list";
  drillList.innerHTML = (secData.drills || []).map(d => `
    <div class="gate-spec-card" style="border-left-color: #007bff;">
      <div>
        <div class="card-label">RECOMMENDED DRILL</div>
        <span class="card-value">${d.name}</span>
      </div>
      <div class="card-reason-box">
        <div class="font-bold text-xs text-gray-400 mb-1">【目的】</div>
        <div class="mb-3">${d.purpose}</div>
        <div class="font-bold text-xs text-gray-400 mb-1">【手順】</div>
        <div>${d.how}</div>
      </div>
    </div>
  `).join("");
  
  sec.appendChild(drillList);
  reportContent.appendChild(sec);
}

function render09(secData) {
  const sec = sectionWrap(secData.title);

  // ✅ 入力が無い場合（空の09）
  if (secData.empty) {
    const box = document.createElement("div");
    box.className = "card mt-3 muted whitespace-pre-line";
    box.textContent = secData.message || "この項目は任意入力です。";
    sec.appendChild(box);
    reportContent.appendChild(sec);
    return;
  }

  // ✅ 通常の09（カード型レイアウト）
  const cardList = document.createElement("div");
  cardList.className = "gate-card-list";
  cardList.innerHTML = (secData.table || []).map(r => `
    <div class="gate-spec-card">
      <div>
        <div class="card-label">項目: ${r.item}</div>
        <span class="card-value">${r.guide}</span>
      </div>
      <div class="card-reason-box">
        ${r.reason}
      </div>
    </div>
  `).join("");
  sec.appendChild(cardList);

  // ✅ 既存の注釈表示ロジックを維持
  if (secData.note) {
    const note = document.createElement("div");
    note.className = "muted mt-2";
    note.textContent = secData.note;
    sec.appendChild(note);
  }

  reportContent.appendChild(sec);
}

  function renderTextSection(secData) {
    const sec = sectionWrap(secData.title);
    const box = document.createElement("div");
    box.className = "card mt-3";
    box.innerHTML = (secData.text || []).map(t => {
      if (t === "") return `<div class="h-3"></div>`;
      return `<p class="lead">${t}</p>`;
    }).join("");
    sec.appendChild(box);
    reportContent.appendChild(sec);
  }

  fetch(`/api/report_data/${reportId}`)
    .then(r => r.json())
    .then(data => {
      loadingEl.classList.add("hidden");
      if (String(data.status).toUpperCase() === "COMPLETED") {
        reportContent.classList.remove("hidden");

        // ★ここ追加
        window.reportAddressPosture = data.address_posture;
        window.reportSpineMaintain = data.spine_maintain;

        if (data.is_premium) premiumBadge.classList.remove("hidden");

        // analysisデータを取得
        const a = data.analysis || {};

        // ★【新規追加】一番上にスコアを描画
        if (a["00_score"]) {
            render00_score(a["00_score"]);
        }

        // ★【追加箇所3】比較データがあれば描画する
        if (a["00_comparison"]) {
            render00_comparison(a["00_comparison"]);
        }

        if (data.overlay_video_url) {
          renderVideo(data.overlay_video_url, data.overlay_video_download_url);
        }
        
        if (a["01"]) render01(a["01"]);
        ["02","03","04","05","06"].forEach(k => a[k] && render02to06(k, a[k]));
        if (a["07"]) renderTextSection(a["07"]);
        if (a["08"]) render08(a["08"]);
        if (a["09"]) render09(a["09"]);
        if (a["10"]) renderTextSection(a["10"]);
      }
    });
</script>
</body>
</html>
